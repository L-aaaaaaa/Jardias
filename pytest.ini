[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    integration: requires external services or a live application process
    slow: long-running tests excluded from the default unit suite
    asyncio: async tests using asyncio
filterwarnings =
    ignore::DeprecationWarning
